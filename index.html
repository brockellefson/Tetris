<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tetris</title>
  <!-- Orbitron — the iconic synthwave / outrun typeface. We pull a
       full weight range so the UI can use 500 for body, 700 for
       headings, and 800/900 for the punchy stat numbers and
       notification bursts. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700;800;900&display=swap">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- ============================================================
       Synthwave background — sliced sun, wireframe mountains, and a
       pink perspective grid that scrolls toward the viewer to fake
       forward motion. Pure decoration; sits behind everything and
       never catches input. The scanline overlay (body::after) and
       the game UI (#app) both stack on top of this.
       ============================================================ -->
  <div id="synthwave-bg" aria-hidden="true">
    <div class="sw-sun"></div>
    <svg class="sw-mountains" viewBox="0 0 1200 220" preserveAspectRatio="xMidYMax slice">
      <!-- Two soft layered ranges of rolling hills. Back layer is a
           slightly lighter violet to suggest atmospheric depth; front
           layer is the deepest blue-purple so it reads as foreground.
           Both are smooth-curve silhouettes — no fills internally,
           just dark domes against the sun. -->
      <path class="sw-hills-back"  d="M0,220 C90,140 190,140 290,175 C400,110 510,110 620,165 C730,100 840,100 950,160 C1050,120 1150,125 1200,165 L1200,220 Z" />
      <path class="sw-hills-front" d="M0,220 C140,185 250,160 400,195 C540,170 660,165 810,200 C950,180 1060,180 1200,205 L1200,220 Z" />
    </svg>
    <div class="sw-horizon-glow"></div>
    <div class="sw-grid"></div>
  </div>

  <div id="app">
    <!-- Mobile / touch action bar — sits at the TOP of the column on
         small screens so it never overlaps the playfield. Each button
         dispatches through Game's public action methods or the plugin
         service bus (`_interceptInput('chisel:activate')` etc.), so
         touch and keyboard land on the same code paths.

         Visibility is gated per-button by syncMobileButtons() in
         main.js: hold appears once unlocked; chisel/fill/flip/whoops
         appear once their charge counter > 0, with the count rendered
         as a small neon badge. The whole bar collapses to nothing when
         no buttons are visible (see the `is-empty` class) so an early-
         game player who hasn't unlocked anything yet sees a clean
         layout. The bar itself only appears at viewport widths ≤768px
         (see the @media block in styles.css).

         Pause is intentionally NOT in this bar — it lives as the
         small icon button in the top-right corner below. -->
    <div id="action-bar" class="action-bar">
      <button class="action-btn hidden" data-action="hold"   type="button">
        <span class="action-btn-label">HOLD</span>
      </button>
      <button class="action-btn hidden" data-action="chisel" type="button">
        <span class="action-btn-label">CHISEL</span>
        <span class="action-btn-badge"></span>
      </button>
      <button class="action-btn hidden" data-action="fill"   type="button">
        <span class="action-btn-label">FILL</span>
        <span class="action-btn-badge"></span>
      </button>
      <button class="action-btn hidden" data-action="flip"   type="button">
        <span class="action-btn-label">FLIP</span>
        <span class="action-btn-badge"></span>
      </button>
      <button class="action-btn hidden" data-action="whoops" type="button">
        <span class="action-btn-label">WHOOPS</span>
      </button>
    </div>

    <div class="game">
      <div>
        <div class="panel" id="hold-panel">
          <h2>Hold</h2>
          <canvas id="hold" class="mini" width="100" height="80"></canvas>
        </div>
        <div class="panel" style="margin-top: 14px;">
          <h2>Score</h2>
          <div class="stat" id="score">0</div>
          <h2>Level</h2>
          <div class="stat" id="level">1</div>
          <h2>Lines</h2>
          <div class="stat" id="lines">0</div>
          <div id="blessing-section" class="hidden">
            <h2>Blessings</h2>
            <div class="blessing-list" id="blessing-list"></div>
          </div>
          <div id="curse-section" class="hidden">
            <h2>Curses</h2>
            <div class="curse-list" id="curse-list"></div>
          </div>
        </div>
      </div>

      <div id="board-wrap">
        <canvas id="board" width="300" height="600"></canvas>
        <div id="notifications"></div>
        <div id="overlay" class="hidden">PAUSED<small>PRESS P TO RESUME</small></div>
      </div>

      <div>
        <div class="panel" id="next-panel">
          <h2>Next</h2>
          <div class="next-list">
            <canvas class="mini next" width="120" height="80"></canvas>
            <canvas class="mini next" width="120" height="80"></canvas>
            <canvas class="mini next" width="120" height="80"></canvas>
            <canvas class="mini next" width="120" height="80"></canvas>
            <canvas class="mini next" width="120" height="80"></canvas>
          </div>
        </div>
      </div>
    </div>

    <!-- Controls reference. Anchored to the bottom-right corner of the
         viewport rather than living inside the .game grid, so it stays
         pinned in place regardless of how tall the Next/Hold panels
         render. Each row is a grid cell pair (kbd, label) so the kbds
         line up in a clean column instead of drifting around with the
         label widths. Hidden on small screens by the responsive CSS
         block — the on-screen action bar takes its place there. -->
    <div class="controls">
      <kbd>P</kbd><span>pause</span>
      <kbd>C</kbd><span>hold</span>
      <kbd>A</kbd><span>chisel</span>
      <kbd>S</kbd><span>fill</span>
      <kbd>F</kbd><span>flip</span>
    </div>

    <!-- Pause toggle — pinned to the top-right corner on mobile. The
         icon swaps between the universal pause glyph (two bars) when
         the run is live and the play glyph (triangle) when the run is
         paused, mirroring every video player ever. Hidden on desktop,
         where the keyboard P key handles pause. Hidden when the game
         isn't started or has ended; main.js's syncMobileButtons drives
         the show/hide and the icon swap. -->
    <button id="pause-btn" class="pause-btn hidden" type="button" aria-label="Pause">
      <svg class="pause-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <rect x="6"  y="5" width="4" height="14" rx="1"/>
        <rect x="14" y="5" width="4" height="14" rx="1"/>
      </svg>
      <svg class="play-icon"  viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M7 5 L18 12 L7 19 Z"/>
      </svg>
    </button>
  </div>

  <!-- ============================================================
       Main menu screen — full-viewport title splash shown on initial
       page load. Sits above the synthwave background but below the
       power-up modal. The Play button (or any key press) hides it
       and kicks off the game via the same path as the original
       "PRESS ANY KEY TO START" overlay. After the game starts, the
       menu does not return — game-over uses the in-board overlay.
       ============================================================ -->
  <div id="menu-screen">
    <div class="menu-inner">
      <h1 class="menu-title" aria-label="Stackoverflow">
        <span class="menu-title-text">STACKOVERFLOW</span>
      </h1>
      <button id="play-btn" class="menu-btn" type="button">
        <span class="menu-btn-text">PLAY</span>
      </button>
    </div>
  </div>

  <!-- Power-up choice menu — populated and shown by main.js. Each
       card now bundles a random curse alongside the power-up so the
       player has to weigh the buff against the debuff on every pick.
       The cards speak for themselves; no heading needed. -->
  <div id="powerup-menu" class="hidden">
    <div class="powerup-menu-inner">
      <div class="powerup-cards" id="powerup-cards"></div>
    </div>
  </div>

  <!-- Background theme music. Loops forever once the game starts.
       Browsers gate audio playback behind a user gesture, so we don't
       call .play() until the player presses their first key (handled
       in main.js via the onStart callback). -->
  <audio id="theme-music" src="assets/theme.mp3" loop preload="auto"></audio>

  <script type="module" src="js/main.js"></script>
</body>
</html>
