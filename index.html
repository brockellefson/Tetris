<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tetris</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <div class="game">
      <div>
        <div class="panel">
          <h2>Hold</h2>
          <canvas id="hold" class="mini" width="100" height="80"></canvas>
        </div>
        <div class="panel" style="margin-top: 14px;">
          <h2>Score</h2>
          <div class="stat" id="score">0</div>
          <h2>Level</h2>
          <div class="stat" id="level">1</div>
          <h2>Lines</h2>
          <div class="stat" id="lines">0</div>
        </div>
        <div class="controls">
          <kbd>&larr;</kbd><kbd>&rarr;</kbd> move<br>
          <kbd>&darr;</kbd> soft drop<br>
          <kbd>&uarr;</kbd> rotate<br>
          <kbd>Space</kbd> hard drop<br>
          <kbd>C</kbd> hold<br>
          <kbd>P</kbd> pause<br>
          <kbd>R</kbd> restart
        </div>
      </div>

      <div id="board-wrap">
        <canvas id="board" width="300" height="600"></canvas>
        <div id="overlay">PRESS ANY KEY<small>TO START</small></div>
      </div>

      <div>
        <div class="panel">
          <h2>Next</h2>
          <div class="next-list">
            <canvas class="mini next" width="120" height="80"></canvas>
            <canvas class="mini next" width="120" height="80"></canvas>
            <canvas class="mini next" width="120" height="80"></canvas>
            <canvas class="mini next" width="120" height="80"></canvas>
            <canvas class="mini next" width="120" height="80"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
