<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tetris</title>
  <!-- Orbitron — the iconic synthwave / outrun typeface. We pull a
       full weight range so the UI can use 500 for body, 700 for
       headings, and 800/900 for the punchy stat numbers and
       notification bursts. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700;800;900&display=swap">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- ============================================================
       Synthwave background — sliced sun, wireframe mountains, and a
       pink perspective grid that scrolls toward the viewer to fake
       forward motion. Pure decoration; sits behind everything and
       never catches input. The scanline overlay (body::after) and
       the game UI (#app) both stack on top of this.
       ============================================================ -->
  <div id="synthwave-bg" aria-hidden="true">
    <div class="sw-sun"></div>
    <svg class="sw-mountains" viewBox="0 0 1200 220" preserveAspectRatio="xMidYMax slice">
      <!-- Two soft layered ranges of rolling hills. Back layer is a
           slightly lighter violet to suggest atmospheric depth; front
           layer is the deepest blue-purple so it reads as foreground.
           Both are smooth-curve silhouettes — no fills internally,
           just dark domes against the sun. -->
      <path class="sw-hills-back"  d="M0,220 C90,140 190,140 290,175 C400,110 510,110 620,165 C730,100 840,100 950,160 C1050,120 1150,125 1200,165 L1200,220 Z" />
      <path class="sw-hills-front" d="M0,220 C140,185 250,160 400,195 C540,170 660,165 810,200 C950,180 1060,180 1200,205 L1200,220 Z" />
    </svg>
    <div class="sw-horizon-glow"></div>
    <div class="sw-grid"></div>
  </div>

  <div id="app">
    <div class="game">
      <div>
        <div class="panel" id="hold-panel">
          <h2>Hold</h2>
          <canvas id="hold" class="mini" width="100" height="80"></canvas>
        </div>
        <div class="panel" style="margin-top: 14px;">
          <h2>Score</h2>
          <div class="stat" id="score">0</div>
          <h2>Level</h2>
          <div class="stat" id="level">1</div>
          <h2>Lines</h2>
          <div class="stat" id="lines">0</div>
          <div id="blessing-section" class="hidden">
            <h2>Blessings</h2>
            <div class="blessing-list" id="blessing-list"></div>
          </div>
          <div id="curse-section" class="hidden">
            <h2>Curses</h2>
            <div class="curse-list" id="curse-list"></div>
          </div>
        </div>
      </div>

      <div id="board-wrap">
        <canvas id="board" width="300" height="600"></canvas>
        <div id="notifications"></div>
        <div id="overlay">PRESS ANY KEY<small>TO START</small></div>
      </div>

      <div>
        <div class="panel" id="next-panel">
          <h2>Next</h2>
          <div class="next-list">
            <canvas class="mini next" width="120" height="80"></canvas>
            <canvas class="mini next" width="120" height="80"></canvas>
            <canvas class="mini next" width="120" height="80"></canvas>
            <canvas class="mini next" width="120" height="80"></canvas>
            <canvas class="mini next" width="120" height="80"></canvas>
          </div>
        </div>
      </div>
    </div>

    <!-- Controls reference. Anchored to the bottom-right corner of the
         viewport rather than living inside the .game grid, so it stays
         pinned in place regardless of how tall the Next/Hold panels
         render. Each row is a grid cell pair (kbd, label) so the kbds
         line up in a clean column instead of drifting around with the
         label widths. -->
    <div class="controls">
      <kbd>P</kbd><span>pause</span>
      <kbd>C</kbd><span>hold</span>
      <kbd>A</kbd><span>chisel</span>
      <kbd>S</kbd><span>fill</span>
      <kbd>F</kbd><span>flip</span>
    </div>
  </div>

  <!-- Power-up choice menu — populated and shown by main.js. Each
       card now bundles a random curse alongside the power-up so the
       player has to weigh the buff against the debuff on every pick.
       The cards speak for themselves; no heading needed. -->
  <div id="powerup-menu" class="hidden">
    <div class="powerup-menu-inner">
      <div class="powerup-cards" id="powerup-cards"></div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
